<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Background -->
  <rect width="400" height="400" fill="#ffffff"/>

  <!-- Main image frame (same position as step 1 & 2) -->
  <rect x="60" y="140" width="200" height="130" fill="none" stroke="#1a1a1a" stroke-width="2"/>

  <!-- Main image content: horizon + foreground object (triangle mountain is gone) -->
  <line x1="75" y1="220" x2="245" y2="220" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
  <rect x="85" y="240" width="22" height="18" fill="none" stroke="#1a1a1a" stroke-width="2"/>

  <!-- THE FIX: circle now sits on the horizon, where the triangle mountain used to be -->
